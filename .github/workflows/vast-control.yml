name: Sila Image Studio Control

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Start or Stop Sila?'
        required: true
        default: 'start'
        type: choice
        options:
          - start
          - stop

jobs:
  control-vast:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Install Vast.ai CLI
        run: pip install vastai --quiet

      - name: Configure Vast.ai API key
        run: vastai set api-key ${{ secrets.VASTAI_API_KEY }}

      - name: Start Vast.ai instance
        if: ${{ inputs.action == 'start' }}
        run: |
          vastai start instance 39915400
          sleep 60

      - name: Get SSH details
        if: ${{ inputs.action == 'start' }}
        run: |
          INFO=$(vastai show instance 39915400 --raw)
          SSH_HOST=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ssh_host',''))")
          SSH_PORT=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ssh_port',''))")
          echo "SSH_HOST=$SSH_HOST" >> $GITHUB_ENV
          echo "SSH_PORT=$SSH_PORT" >> $GITHUB_ENV

      - name: Run start.sh on server
        if: ${{ inputs.action == 'start' }}
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/vastai_key
          chmod 600 /tmp/vastai_key
          ssh -p $SSH_PORT root@$SSH_HOST -i /tmp/vastai_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 "bash /workspace/start.sh"
          rm -f /tmp/vastai_key

      - name: Done - Sila is LIVE
        if: ${{ inputs.action == 'start' }}
        run: echo "URL -- https://capsule-retiree-shorty.ngrok-free.dev"

      - name: Stop app and instance
        if: ${{ inputs.action == 'stop' }}
        run: |
          INFO=$(vastai show instance 39915400 --raw)
          SSH_HOST=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ssh_host',''))")
          SSH_PORT=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ssh_port',''))")
          if [ -n "$SSH_HOST" ]; then
            echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/vastai_key
            chmod 600 /tmp/vastai_key
            ssh -p $SSH_PORT root@$SSH_HOST -i /tmp/vastai_key -o StrictHostKeyChecking=no "pkill -f app.py; pkill -f ngrok" || true
            rm -f /tmp/vastai_key
          fi
          vastai stop instance 39915400
          echo "Instance stopped. Billing paused."
