name: Telegram Bot - Sila Control

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check Telegram and act
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_REPO: alokranjan-ks/Sila
          VASTAI_API_KEY: ${{ secrets.VASTAI_API_KEY }}
          SSH_KEY_CONTENT: ${{ secrets.SSH_PRIVATE_KEY }}
          LAST_ID: ${{ vars.LAST_UPDATE_ID }}
        run: |
          pip install vastai --quiet

          RESPONSE=$(curl -s "https://api.telegram.org/bot${TG_TOKEN}/getUpdates?limit=5")
          UPDATE_ID=$(echo "$RESPONSE" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          r=d.get('result',[])
          print(r[-1]['update_id'] if r else 0)
          ")
          TEXT=$(echo "$RESPONSE" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          r=d.get('result',[])
          print(r[-1].get('message',{}).get('text','').lower().strip() if r else '')
          ")

          echo "update_id=$UPDATE_ID text='$TEXT' last_processed=${LAST_ID}"

          if [ "$UPDATE_ID" -le "${LAST_ID:-0}" ]; then
            echo "No new commands."
            exit 0
          fi

          if [ "$TEXT" = "start vast" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT_ID}" \
              --data-urlencode "text=Starting Sila Image Studio... Please wait ~3 minutes." > /dev/null

            vastai set api-key $VASTAI_API_KEY
            vastai start instance 39915400

            # Wait for SSH port to be open (poll every 10s, up to 5 minutes)
            INFO=$(vastai show instance 39915400 --raw)
            SSH_HOST=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ssh_host',''))")
            SSH_PORT=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ssh_port',''))")
            echo "Waiting for SSH on $SSH_HOST:$SSH_PORT ..."

            for i in $(seq 1 30); do
              sleep 10
              if nc -z -w5 $SSH_HOST $SSH_PORT 2>/dev/null; then
                echo "SSH port is open after ${i}0 seconds!"
                break
              fi
              echo "  Attempt $i: SSH not ready yet..."
            done

            # Extra 5s for SSH daemon to fully start
            sleep 5
            echo "$SSH_KEY_CONTENT" > /tmp/key && chmod 600 /tmp/key

            ssh -p $SSH_PORT root@$SSH_HOST -i /tmp/key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              "bash /workspace/start.sh"
            rm -f /tmp/key

            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT_ID}" \
              --data-urlencode "text=Sila is LIVE! Open: https://capsule-retiree-shorty.ngrok-free.dev" > /dev/null

          elif [ "$TEXT" = "stop vast" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT_ID}" \
              --data-urlencode "text=Stopping Sila Image Studio..." > /dev/null

            vastai set api-key $VASTAI_API_KEY
            INFO=$(vastai show instance 39915400 --raw)
            SSH_HOST=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ssh_host',''))")
            SSH_PORT=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ssh_port',''))")

            if [ -n "$SSH_HOST" ] && [ -n "$SSH_PORT" ]; then
              echo "$SSH_KEY_CONTENT" > /tmp/key && chmod 600 /tmp/key
              ssh -p $SSH_PORT root@$SSH_HOST -i /tmp/key \
                -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
                "pkill -f app.py; pkill -f ngrok" || true
              rm -f /tmp/key
            fi

            vastai stop instance 39915400

            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT_ID}" \
              --data-urlencode "text=Instance stopped. Billing paused." > /dev/null

          else
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT_ID}" \
              --data-urlencode "text=Unknown command. Send: Start Vast or Stop Vast" > /dev/null
          fi

          curl -s -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GH_REPO}/actions/variables/LAST_UPDATE_ID" \
            -d "{\"name\":\"LAST_UPDATE_ID\",\"value\":\"${UPDATE_ID}\"}" > /dev/null
