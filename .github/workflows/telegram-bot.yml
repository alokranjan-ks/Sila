name: Telegram Bot - Sila Control

on:
  schedule:
    - cron: '*/5 * * * *'   # runs every 5 minutes
  workflow_dispatch:          # also allow manual trigger

jobs:
  check-telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Check Telegram for start/stop commands
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_REPO: alokranjan-ks/Sila
          VASTAI_API_KEY: ${{ secrets.VASTAI_API_KEY }}
        run: |
          pip install vastai --quiet

          # Get last message from Telegram
          RESPONSE=$(curl -s "https://api.telegram.org/bot${TG_TOKEN}/getUpdates?limit=5&allowed_updates=message")
          
          # Get the latest message text and its update_id
          LAST_TEXT=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          results = data.get('result', [])
          if results:
              last = results[-1]
              msg = last.get('message', {})
              text = msg.get('text', '').lower().strip()
              update_id = last.get('update_id', 0)
              print(f'{update_id}|{text}')
          else:
              print('0|none')
          ")

          UPDATE_ID=$(echo "$LAST_TEXT" | cut -d'|' -f1)
          TEXT=$(echo "$LAST_TEXT" | cut -d'|' -f2)
          echo "Latest message: '$TEXT' (update_id: $UPDATE_ID)"

          # Read last processed update_id from repo variable (stored as secret)
          LAST_ID="${{ secrets.LAST_UPDATE_ID }}"
          LAST_ID="${LAST_ID:-0}"
          echo "Last processed ID: $LAST_ID"

          # Only act if this is a NEW message
          if [ "$UPDATE_ID" -le "$LAST_ID" ]; then
            echo "No new commands. Exiting."
            exit 0
          fi

          # Process command
          if [ "$TEXT" = "start vast" ]; then
            echo "START command received!"
            
            # Reply immediately on Telegram
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT_ID}" \
              -d "text=🟢 Starting Sila Image Studio... (received: Start Vast)... Please wait ~2 minutes." > /dev/null

            # Start the Vast.ai instance
            vastai set api-key $VASTAI_API_KEY
            vastai start instance 39915400
            sleep 70

            # Get SSH details
            INFO=$(vastai show instance 39915400 --raw)
            SSH_HOST=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ssh_host',''))")
            SSH_PORT=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ssh_port',''))")

            # SSH and run start.sh
            echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/key && chmod 600 /tmp/key
            ssh -p $SSH_PORT root@$SSH_HOST -i /tmp/key -o StrictHostKeyChecking=no -o ConnectTimeout=30 "bash /workspace/start.sh"
            rm -f /tmp/key

            # Send success message with URL
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT_ID}" \
              -d "text=✅ Sila is LIVE!

🔗 https://capsule-retiree-shorty.ngrok-free.dev

Share this link with Alok 👆"

          elif [ "$TEXT" = "stop vast" ]; then
            echo "STOP command received!"

            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT_ID}" \
              -d "text=🔴 Stopping Sila Image Studio..." > /dev/null

            # Stop gracefully
            INFO=$(vastai show instance 39915400 --raw)
            SSH_HOST=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ssh_host',''))")
            SSH_PORT=$(echo "$INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ssh_port',''))")
            vastai set api-key $VASTAI_API_KEY
            if [ -n "$SSH_HOST" ]; then
              echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/key && chmod 600 /tmp/key
              ssh -p $SSH_PORT root@$SSH_HOST -i /tmp/key -o StrictHostKeyChecking=no "pkill -f app.py; pkill -f ngrok" || true
              rm -f /tmp/key
            fi
            vastai stop instance 39915400

            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT_ID}" \
              -d "text=✅ Instance stopped. Billing paused 💰"

          else
            echo "Unknown command '$TEXT' — ignoring."
            curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT_ID}" \
              -d "text=⚠️ Unknown command. Send 'Start Vast' or 'Stop Vast'." > /dev/null
          fi

          # Update last processed ID via GitHub API
          curl -s -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GH_REPO}/actions/variables/LAST_UPDATE_ID" \
            -d "{\"name\":\"LAST_UPDATE_ID\",\"value\":\"${UPDATE_ID}\"}" || true
